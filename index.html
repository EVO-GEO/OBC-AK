<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Apps — OBC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: #0d1f17; color: #f1f5f9; min-height: 100vh; }
  header { background: #132a1e; border-bottom: 2px solid #1e4a30; padding: 24px 32px; }
  header h1 { font-size: 1.8rem; font-weight: 900; color: #4ade80; letter-spacing: -0.5px; }
  header p { font-size: 0.88rem; opacity: 0.55; margin-top: 4px; }
  .welcome-banner { background: linear-gradient(135deg, #132a1e 0%, #0d2b1a 60%, #0d1f17 100%); border-bottom: 2px solid #1e4a30; padding: 24px 32px 0 32px; display: flex; align-items: flex-end; gap: 28px; }
  .avatar-wrap { flex-shrink: 0; width: 160px; filter: drop-shadow(0 0 16px rgba(74,222,128,0.3)); }
  .avatar-wrap img { width: 100%; height: auto; display: block; }
  .welcome-text { flex: 1; padding-bottom: 24px; }
  .welcome-text .groet { font-size: 1.25rem; font-weight: 900; color: #4ade80; }
  .welcome-text .boodschap { font-size: 0.9rem; color: #a7f3b8; margin-top: 6px; line-height: 1.6; max-width: 580px; }
  #klas-tabs { display: flex; gap: 6px; padding: 16px 32px; background: #132a1e; border-bottom: 2px solid #1e4a30; flex-wrap: wrap; }
  .klas-tab { background: #0d1f17; border: 2px solid #1e4a30; border-radius: 10px; padding: 7px 16px; color: #6ee7a0; font-weight: 700; cursor: pointer; }
  .klas-tab.actief { background: #4ade80; color: #0d1f17; }
  main { max-width: 1000px; margin: 0 auto; padding: 28px 24px; }
  .klas-view { display: none; }
  .klas-view.actief { display: block; }
  .hoofdstuk { margin-bottom: 12px; border: 2px solid #132a1e; border-radius: 14px; overflow: hidden; }
  .hoofdstuk-header { background: #132a1e; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .hoofdstuk-naam { font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .h-num { background: #0d1f17; border: 1.5px solid #1e4a30; border-radius: 6px; padding: 2px 10px; color: #4ade80; }
  .hoofdstuk-body { display: none; padding: 14px 20px; background: #091510; }
  .hoofdstuk.open .hoofdstuk-body { display: block; }
  .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .app-kaart { background: #132a1e; border: 2px solid #1e4a30; border-radius: 12px; padding: 16px 18px; text-decoration: none; color: #f1f5f9; display: flex; align-items: center; gap: 12px; }
  footer { text-align: center; padding: 24px; font-size: 0.75rem; opacity: 0.25; }
</style>
</head>
<body>

<header>
  <h1>🌍 AK Apps — OBC</h1>
  <p>Aardrijkskunde apps per klas en hoofdstuk</p>
</header>

<div class="welcome-banner">
  <div class="welcome-text">
    <div class="groet">👋 Hé, welkom bij AK Apps!</div>
    <div class="boodschap">Kies je klas en ga op avontuur. De wereld wacht op jou!</div>
  </div>
  <div class="avatar-wrap">
    <img src="avatar1.png" alt="Avatar">
  </div>
</div>

<div id="klas-tabs"></div>
<main id="klas-inhoud"></main>
<footer>EVO-GEO · OBC</footer>

<script>
const KLASSEN = [
  { naam: "VWO 1", id: "vwo1", hoofdstukken: [
    { nr: 1, apps: [] }, { nr: 2, apps: [] },
    { nr: 3, apps: [{ titel: "Klimaatkenner", beschrijving: "Alle klimaten!", icon: "🌡️", pad: "vwo1/hoofdstuk3/3.1klimaten.html" }] },
    { nr: 4, apps: [] }
  ]},
  { naam: "VWO 2", id: "vwo2", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "HAVO 1", id: "havo1", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "HAVO 2", id: "havo2", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "VMBO 1", id: "vmbo1", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "VMBO 2", id: "vmbo2", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "VMBO 3", id: "vmbo3", hoofdstukken: [
    { nr: 1, apps: [] }, { nr: 2, apps: [] },
    { nr: 3, apps: [
      { titel: "Energieminister", beschrijving: "Energiebeleid simulatie", icon: "⚡", pad: "vmbo3/hoofdstuk3/Game-H3-energie_minister.html" },
      { titel: "Overzicht H3", beschrijving: "Alle stof op 1 plek!", icon: "⚡", pad: "vmbo3/hoofdstuk3/t3h3overzicht.html" }
    ]},
    { nr: 4, apps: [
      { titel: "4.1 Vida Brasileira", beschrijving: "Beleef Brazilië!", icon: "🌴", pad: "vmbo3/hoofdstuk4/4.1-vida-brasileira-v2.html" }
    ]},
    { nr: 5, apps: [] }, { nr: 6, apps: [] }
  ]},
  { naam: "VMBO 4", id: "vmbo4", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] }
];

const tabsEl = document.getElementById('klas-tabs');
const inhoudEl = document.getElementById('klas-inhoud');

KLASSEN.forEach((klas, i) => {
  const tab = document.createElement('button');
  tab.className = 'klas-tab' + (i === 0 ? ' actief' : '');
  tab.textContent = klas.naam;
  tab.onclick = () => {
    document.querySelectorAll('.klas-tab').forEach(t => t.classList.remove('actief'));
    tab.classList.add('actief');
    document.querySelectorAll('.klas-view').forEach(v => v.classList.remove('actief'));
    document.getElementById(`view-${klas.id}`).classList.add('actief');
  };
  tabsEl.appendChild(tab);

  const view = document.createElement('div');
  view.className = 'klas-view' + (i === 0 ? ' actief' : '');
  view.id = `view-${klas.id}`;
  
  klas.hoofdstukken.forEach(hst => {
    const sectie = document.createElement('div');
    sectie.className = 'hoofdstuk' + (hst.apps.length > 0 ? ' open' : '');
    
    sectie.innerHTML = `
      <div class="hoofdstuk-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="hoofdstuk-naam"><span class="h-num">H${hst.nr}</span> Hoofdstuk ${hst.nr}</div>
        <span>▼</span>
      </div>
      <div class="hoofdstuk-body">
        <div class="apps-grid">
          ${hst.apps.length > 0 ? hst.apps.map(app => `
            <a href="${app.pad}" class="app-kaart">
              <span>${app.icon}</span>
              <div><strong>${app.titel}</strong><br><small>${app.beschrijving}</small></div>
            </a>
          `).join('') : '<p style="opacity:0.5">Nog geen apps.</p>'}
        </div>
      </div>`;
    view.appendChild(sectie);
  });
  inhoudEl.appendChild(view);
});
</script>
</body>
</html>
