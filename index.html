<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Apps — OBC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  /* Basis instellingen */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Nunito', sans-serif; 
    background: #f8fafc; /* Lichte achtergrond */
    color: #1e293b; /* Donkere letters */
    min-height: 100vh; 
    line-height: 1.6;
  }

  /* Excentrieke Header & Banner */
  header { 
    background: #ffffff; 
    border-bottom: 4px solid #4ade80; 
    padding: 30px 32px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }
  header h1 { font-size: 2rem; font-weight: 900; color: #166534; letter-spacing: -1px; }
  header p { font-size: 1rem; color: #64748b; margin-top: 4px; font-weight: 600; }

  .welcome-banner { 
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); 
    border-bottom: 2px solid #bdf4c9; 
    padding: 40px 32px; 
    display: flex; 
    align-items: center; 
    gap: 40px;
    position: relative;
    overflow: hidden;
  }
  /* Decoratieve cirkel voor die excentrieke look */
  .welcome-banner::after {
    content: ''; position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; 
    background: #4ade80; opacity: 0.1; border-radius: 50%;
  }

  .avatar-wrap { flex-shrink: 0; width: 140px; z-index: 2; }
  .avatar-wrap img { width: 100%; height: auto; border-radius: 20px; transform: rotate(-3deg); transition: 0.3s; }
  .avatar-wrap img:hover { transform: rotate(0deg) scale(1.05); }

  .welcome-text { flex: 1; z-index: 2; }
  .welcome-text .groet { font-size: 1.8rem; font-weight: 900; color: #14532d; margin-bottom: 8px; }
  .welcome-text .boodschap { font-size: 1.1rem; color: #334155; max-width: 650px; }

  /* Tabs met meer karakter */
  #klas-tabs { 
    display: flex; gap: 10px; padding: 20px 32px; 
    background: #ffffff; border-bottom: 1px solid #e2e8f0; 
    flex-wrap: wrap; position: sticky; top: 0; z-index: 10;
  }
  .klas-tab { 
    background: #f1f5f9; border: 2px solid #e2e8f0; border-radius: 12px; 
    padding: 10px 20px; color: #475569; font-weight: 800; cursor: pointer; 
    transition: all 0.2s ease;
  }
  .klas-tab:hover { border-color: #4ade80; background: #f0fdf4; }
  .klas-tab.actief { background: #166534; color: #ffffff; border-color: #166534; box-shadow: 0 4px 12px rgba(22,101,52,0.2); }

  main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  .klas-view { display: none; }
  .klas-view.actief { display: block; animation: fadeIn 0.4s ease; }

  /* Hoofdstukken */
  .hoofdstuk { margin-bottom: 16px; background: #fff; border: 2px solid #e2e8f0; border-radius: 16px; overflow: hidden; transition: 0.3s; }
  .hoofdstuk:hover { border-color: #4ade80; }
  .hoofdstuk-header { padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .hoofdstuk-naam { font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 12px; color: #1e293b; }
  .h-num { background: #4ade80; border-radius: 8px; padding: 4px 12px; color: #14532d; font-size: 0.9rem; }

  .hoofdstuk-body { display: none; padding: 20px 24px; background: #fdfdfd; border-top: 1px solid #f1f5f9; }
  .hoofdstuk.open .hoofdstuk-body { display: block; }

  /* Apps kaarten */
  .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
  .app-kaart { 
    background: #ffffff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; 
    text-decoration: none; color: #1e293b; display: flex; align-items: center; gap: 15px; 
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  }
  .app-kaart:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: #4ade80; }
  .app-kaart span { font-size: 2rem; }
  .app-kaart strong { display: block; color: #166534; font-size: 1.05rem; }
  .app-kaart small { color: #64748b; font-size: 0.85rem; }

  footer { text-align: center; padding: 40px; font-size: 0.9rem; color: #94a3b8; font-weight: 600; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <h1>🌍 AK Apps — OBC</h1>
  <p>Ontdek de wereld, één klik per keer.</p>
</header>

<div class="welcome-banner">
  <div class="avatar-wrap">
    <img src="avatar1.png" alt="Avatar" onerror="this.src='https://via.placeholder.com/150?text=AK'">
  </div>
  <div class="welcome-text">
    <div class="groet">Hoi! Wat leuk dat je er bent! 👋</div>
    <div class="boodschap">Klaar om de grenzen van je kennis te verleggen? Kies hieronder je klas of bekijk de algemene tools om direct aan de slag te gaan. Veel succes met leren!</div>
  </div>
</div>

<div id="klas-tabs"></div>
<main id="klas-inhoud"></main>
<footer>Gemaakt met passie voor aardrijkskunde • EVO-GEO • OBC 2024</footer>

<script>
// "Algemeen" toegevoegd als eerste categorie
const KLASSEN = [
  { naam: "Algemeen", id: "algemeen", hoofdstukken: [
    { nr: "!", naam: "Handige Tools", apps: [
      { titel: "GeoLingo", beschrijving: "Lingo met een AK twist!", icon: "📖", pad: "algemeen/geolingo/geolingo.html" },
      { titel: "Google Earth", beschrijving: "Vlieg de wereld over.", icon: "🌐", pad: "https://earth.google.com" },
      { titel: "Les op maat", beschrijving: "Maak een les die helemaal bij jou past!", icon: "🌐", pad: "algemeen/lesmaker.html" } 
    ]}
  ]},
  { naam: "VWO 1", id: "vwo1", hoofdstukken: [
    { nr: 1, apps: [] }, { nr: 2, apps: [] },
    { nr: 3, apps: [{ titel: "Klimaatkenner", beschrijving: "Alle klimaten!", icon: "🌡️", pad: "vwo1/hoofdstuk3/3.1klimaten.html" }] },
    { nr: 4, apps: [] }
  ]},
  { naam: "VWO 2", id: "vwo2", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "HAVO 1", id: "havo1", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "HAVO 2", id: "havo2", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "VMBO 1", id: "vmbo1", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "VMBO 2", id: "vmbo2", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] },
  { naam: "VMBO 3", id: "vmbo3", hoofdstukken: [
    { nr: 1, apps: [] }, { nr: 2, apps: [] },
    { nr: 3, apps: [
      { titel: "Energieminister", beschrijving: "Energiebeleid simulatie", icon: "⚡", pad: "vmbo3/hoofdstuk3/Game-H3-energie_minister.html" },
      { titel: "Overzicht H3", beschrijving: "Alle stof op 1 plek!", icon: "⚡", pad: "vmbo3/hoofdstuk3/t3h3overzicht.html" }
      
    ]},
    { nr: 4, apps: [
      { titel: "4.1 Vida Brasileira", beschrijving: "Beleef Brazilië!", icon: "🌴", pad: "vmbo3/hoofdstuk4/4.1-vida-brasileira-v2.html" },
      { titel: "4.2 Reporter in het Zuid-Oosten", beschrijving: "Ga op reportage!", icon: "🌴", pad: "vmbo3/hoofdstuk4/4.2reporter.html" }
    ]},
    { nr: 5, apps: [] }, { nr: 6, apps: [] }
  ]},
  { naam: "VMBO 4", id: "vmbo4", hoofdstukken: [{ nr: 1, apps: [] }, { nr: 2, apps: [] }, { nr: 3, apps: [] }, { nr: 4, apps: [] }] }
];

const tabsEl = document.getElementById('klas-tabs');
const inhoudEl = document.getElementById('klas-inhoud');

KLASSEN.forEach((klas, i) => {
  const tab = document.createElement('button');
  tab.className = 'klas-tab' + (i === 0 ? ' actief' : '');
  tab.textContent = klas.naam;
  tab.onclick = () => {
    document.querySelectorAll('.klas-tab').forEach(t => t.classList.remove('actief'));
    tab.classList.add('actief');
    document.querySelectorAll('.klas-view').forEach(v => v.classList.remove('actief'));
    document.getElementById(`view-${klas.id}`).classList.add('actief');
  };
  tabsEl.appendChild(tab);

  const view = document.createElement('div');
  view.className = 'klas-view' + (i === 0 ? ' actief' : '');
  view.id = `view-${klas.id}`;
  
  klas.hoofdstukken.forEach(hst => {
    const sectie = document.createElement('div');
    sectie.className = 'hoofdstuk' + (hst.apps.length > 0 ? ' open' : '');
    
    // Naamgeving aangepast voor "Algemeen" (zodat er niet "Hoofdstuk !" staat)
    const displayNaam = isNaN(hst.nr) ? hst.naam : `Hoofdstuk ${hst.nr}`;

    sectie.innerHTML = `
      <div class="hoofdstuk-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="hoofdstuk-naam"><span class="h-num">${hst.nr}</span> ${displayNaam}</div>
        <span>▼</span>
      </div>
      <div class="hoofdstuk-body">
        <div class="apps-grid">
          ${hst.apps.length > 0 ? hst.apps.map(app => `
            <a href="${app.pad}" class="app-kaart">
              <span>${app.icon}</span>
              <div><strong>${app.titel}</strong><small>${app.beschrijving}</small></div>
            </a>
          `).join('') : '<p style="opacity:0.5; padding: 10px;">Binnenkort beschikbaar...</p>'}
        </div>
      </div>`;
    view.appendChild(sectie);
  });
  inhoudEl.appendChild(view);
});
</script>
</body>
</html>
