<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Apps — OBC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
  }

  header {
    background: #1e293b;
    border-bottom: 2px solid #334155;
    padding: 24px 32px;
  }

  header h1 { font-size: 1.8rem; font-weight: 900; color: #38bdf8; letter-spacing: -0.5px; }
  header p { font-size: 0.88rem; opacity: 0.55; margin-top: 4px; }

  #klas-tabs {
    display: flex;
    gap: 6px;
    padding: 16px 32px;
    background: #1e293b;
    border-bottom: 2px solid #334155;
    flex-wrap: wrap;
  }

  .klas-tab {
    background: #0f172a;
    border: 2px solid #334155;
    border-radius: 10px;
    padding: 7px 16px;
    color: #94a3b8;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .klas-tab:hover { border-color: #38bdf8; color: #38bdf8; }
  .klas-tab.actief { background: #38bdf8; border-color: #38bdf8; color: #0f172a; }

  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .klas-view { display: none; }
  .klas-view.actief { display: block; }

  .klas-header { margin-bottom: 24px; }
  .klas-header h2 { font-size: 1.4rem; font-weight: 900; }
  .klas-header p { font-size: 0.85rem; opacity: 0.55; margin-top: 4px; }

  .hoofdstuk {
    margin-bottom: 12px;
    border: 2px solid #1e293b;
    border-radius: 14px;
    overflow: hidden;
  }

  .hoofdstuk-header {
    background: #1e293b;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .hoofdstuk-header:hover { background: #263548; }

  .hoofdstuk-naam {
    font-weight: 800;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .h-num {
    background: #0f172a;
    border: 1.5px solid #334155;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 0.8rem;
    color: #38bdf8;
  }

  .h-badge {
    font-size: 0.75rem;
    background: #38bdf822;
    border: 1.5px solid #38bdf8;
    color: #38bdf8;
    border-radius: 6px;
    padding: 1px 8px;
  }

  .h-pijl {
    font-size: 0.85rem;
    opacity: 0.4;
    transition: transform 0.2s;
  }

  .hoofdstuk.open .h-pijl { transform: rotate(90deg); }

  .hoofdstuk-body {
    display: none;
    padding: 14px 20px;
    background: #0a1120;
    border-top: 2px solid #1e293b;
  }

  .hoofdstuk.open .hoofdstuk-body { display: block; }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }

  .app-kaart {
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 12px;
    padding: 16px 18px;
    text-decoration: none;
    color: #f1f5f9;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .app-kaart:hover {
    border-color: #38bdf8;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(56,189,248,0.1);
  }

  .app-icon { font-size: 1.6rem; flex-shrink: 0; }
  .app-info { flex: 1; }
  .app-titel { font-weight: 800; font-size: 0.9rem; line-height: 1.3; }
  .app-meta { font-size: 0.75rem; opacity: 0.5; margin-top: 2px; }
  .app-pijl { font-size: 0.9rem; opacity: 0.35; flex-shrink: 0; }
  .app-kaart:hover .app-pijl { opacity: 1; color: #38bdf8; }

  .leeg-melding {
    color: #334155;
    font-size: 0.85rem;
    font-style: italic;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 0.75rem;
    opacity: 0.25;
    border-top: 2px solid #1e293b;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>🌍 AK Apps — OBC</h1>
  <p>Aardrijkskunde apps per klas en hoofdstuk</p>
</header>

<div id="klas-tabs"></div>
<main id="klas-inhoud"></main>
<footer>EVO-GEO · OBC · Aardrijkskunde</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// APPS TOEVOEGEN:
// Voeg een object toe aan het apps-array van het juiste hoofdstuk:
// { titel: "Naam", beschrijving: "Korte omschrijving", icon: "🌡️", pad: "klas/hoofdstukN/bestand.html" }
//
// LET OP: gebruik GEEN spaties in mapnamen in je repo!
// Gebruik "hoofdstuk3" niet "hoofdstuk 3"
// ─────────────────────────────────────────────────────────────────────────────

const KLASSEN = [
  {
    naam: "VWO 1", id: "vwo1", hoofdstukken: [
      { nr: 1, apps: [{ titel: "Klimaatkenner", beschrijving: "Bekijk in 1 omgeving alle klimaten!", icon: "🌡️", pad: "vwo/hoofdstuk3/3.1-klimatenkaart.html" }] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [] },
      { nr: 4, apps: [] }
    ]
  },
  {
    naam: "VWO 2", id: "vwo2", hoofdstukken: [
      { nr: 1, apps: [] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [] },
      { nr: 4, apps: [] }
    ]
  },
  {
    naam: "HAVO 1", id: "havo1", hoofdstukken: [
      { nr: 1, apps: [] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [] },
      { nr: 4, apps: [] }
    ]
  },
  {
    naam: "HAVO 2", id: "havo2", hoofdstukken: [
      { nr: 1, apps: [] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [] },
      { nr: 4, apps: [] }
    ]
  },
  {
    naam: "VMBO 1", id: "vmbo1", hoofdstukken: [
      { nr: 1, apps: [] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [] },
      { nr: 4, apps: [] }
    ]
  },
  {
    naam: "VMBO 2", id: "vmbo2", hoofdstukken: [
      { nr: 1, apps: [] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [] },
      { nr: 4, apps: [] }
    ]
  },
  {
    naam: "VMBO 3", id: "vmbo3", hoofdstukken: [
      { nr: 1, apps: [] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [
        {
          titel: "Energieminister",
          beschrijving: "Energiebeleid simulatie",
          icon: "⚡",
          pad: "vmbo3/hoofdstuk3/Game-H3-energie_minister.html"
        }
      ]},
      { nr: 4, apps: [{ titel: "4.1 Vida Brasileira", beschrijving: "Beleef de opkomst van Brazilië!", icon: "🌴", pad: "vmbo3/hoofdstuk4/4.1-vida-brasileira-v2.html" }] },
      { nr: 5, apps: [] },
      { nr: 6, apps: [] }
    ]
  },
  {
    naam: "VMBO 4", id: "vmbo4", hoofdstukken: [
      { nr: 1, apps: [] },
      { nr: 2, apps: [] },
      { nr: 3, apps: [] },
      { nr: 4, apps: [] },
      { nr: 5, apps: [] },
      { nr: 6, apps: [] }
    ]
  }
];

// ─── UI bouwen ───────────────────────────────────────────────────────────────
const tabsEl = document.getElementById('klas-tabs');
const inhoudEl = document.getElementById('klas-inhoud');

KLASSEN.forEach((klas, i) => {
  // Tab
  const tab = document.createElement('button');
  tab.className = 'klas-tab' + (i === 0 ? ' actief' : '');
  tab.textContent = klas.naam;
  tab.dataset.id = klas.id;
  tab.addEventListener('click', () => activeerKlas(klas.id));
  tabsEl.appendChild(tab);

  // View
  const view = document.createElement('div');
  view.className = 'klas-view' + (i === 0 ? ' actief' : '');
  view.id = `view-${klas.id}`;

  const totalApps = klas.hoofdstukken.reduce((s, h) => s + h.apps.length, 0);

  const header = document.createElement('div');
  header.className = 'klas-header';
  header.innerHTML = `
    <h2>${klas.naam}</h2>
    <p>${klas.hoofdstukken.length} hoofdstukken · ${totalApps} app${totalApps !== 1 ? 's' : ''} beschikbaar</p>
  `;
  view.appendChild(header);

  // Hoofdstukken
  klas.hoofdstukken.forEach(hst => {
    const sectie = document.createElement('div');
    sectie.className = 'hoofdstuk' + (hst.apps.length > 0 ? ' open' : '');

    const hHeader = document.createElement('div');
    hHeader.className = 'hoofdstuk-header';
    hHeader.innerHTML = `
      <div class="hoofdstuk-naam">
        <span class="h-num">H${hst.nr}</span>
        Hoofdstuk ${hst.nr}
        ${hst.apps.length > 0 ? `<span class="h-badge">${hst.apps.length} app${hst.apps.length > 1 ? 's' : ''}</span>` : ''}
      </div>
      <span class="h-pijl">▶</span>
    `;
    hHeader.addEventListener('click', () => sectie.classList.toggle('open'));

    const hBody = document.createElement('div');
    hBody.className = 'hoofdstuk-body';

    if (hst.apps.length === 0) {
      hBody.innerHTML = '<p class="leeg-melding">Nog geen apps beschikbaar voor dit hoofdstuk.</p>';
    } else {
      const grid = document.createElement('div');
      grid.className = 'apps-grid';
      hst.apps.forEach(app => {
        const kaart = document.createElement('a');
        kaart.className = 'app-kaart';
        kaart.href = app.pad;
        kaart.innerHTML = `
          <div class="app-icon">${app.icon}</div>
          <div class="app-info">
            <div class="app-titel">${app.titel}</div>
            <div class="app-meta">${app.beschrijving}</div>
          </div>
          <div class="app-pijl">→</div>
        `;
        grid.appendChild(kaart);
      });
      hBody.appendChild(grid);
    }

    sectie.appendChild(hHeader);
    sectie.appendChild(hBody);
    view.appendChild(sectie);
  });

  inhoudEl.appendChild(view);
});

function activeerKlas(id) {
  document.querySelectorAll('.klas-tab').forEach(t => t.classList.toggle('actief', t.dataset.id === id));
  document.querySelectorAll('.klas-view').forEach(v => v.classList.toggle('actief', v.id === `view-${id}`));
}
</script>
</body>
</html>
