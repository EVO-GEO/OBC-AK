<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Brasileira 🇧🇷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

:root {
  --bg-dark: #1a0a2e;
  --bg-mid: #2d1b4e;
  --green-br: #009c3b;
  --yellow-br: #ffdf00;
  --blue-br: #002776;
  --text-light: #f0e6d3;
  --text-dim: #a89b8c;
  --pixel-shadow: #0a0512;
  --accent-warm: #e8721c;
  --accent-red: #c43e3e;
  --accent-water: #2e86de;
  --accent-sugar: #7ed957;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-dark);
  color: var(--text-light);
  font-family: 'VT323', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  image-rendering: pixelated;
}

/* ============ TITLE SCREEN ============ */
#title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: linear-gradient(180deg, #002776 0%, #009c3b 50%, #ffdf00 100%);
  position: relative;
  overflow: hidden;
}

#title-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.1) 2px,
    rgba(0,0,0,0.1) 4px
  );
  pointer-events: none;
}

.title-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(24px, 5vw, 48px);
  color: var(--yellow-br);
  text-shadow: 4px 4px 0 var(--pixel-shadow), -2px -2px 0 var(--green-br);
  text-align: center;
  margin-bottom: 8px;
  animation: titlePulse 2s ease-in-out infinite;
  line-height: 1.4;
}

.title-sub {
  font-family: 'VT323', monospace;
  font-size: clamp(18px, 3vw, 28px);
  color: white;
  text-shadow: 2px 2px 0 var(--pixel-shadow);
  margin-bottom: 40px;
  text-align: center;
}

@keyframes titlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.character-select {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
}

.char-card {
  background: rgba(0,0,0,0.6);
  border: 4px solid var(--yellow-br);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  width: 220px;
  position: relative;
}

.char-card:hover {
  transform: translateY(-4px);
  border-color: white;
  box-shadow: 0 8px 0 rgba(0,0,0,0.4);
}

.char-card canvas {
  display: block;
  margin: 0 auto 12px;
  border: 2px solid var(--text-dim);
  background: #1a0a2e;
}

.char-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  color: var(--yellow-br);
  margin-bottom: 8px;
}

.char-desc {
  font-size: 18px;
  color: var(--text-dim);
  line-height: 1.3;
}

/* ============ GAME SCREEN ============ */
#game-screen {
  display: none;
  max-width: 800px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.scene-container {
  padding: 0 16px 120px;
}

/* Year/chapter header */
.year-header {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(14px, 3vw, 20px);
  color: var(--yellow-br);
  text-align: center;
  padding: 20px 0 4px;
  text-shadow: 2px 2px 0 var(--pixel-shadow);
}

.chapter-title {
  font-family: 'VT323', monospace;
  font-size: clamp(22px, 4vw, 32px);
  color: var(--accent-warm);
  text-align: center;
  margin-bottom: 16px;
}

/* Pixel art scene */
.scene-art {
  width: 100%;
  max-width: 760px;
  margin: 0 auto 20px;
  border: 4px solid var(--text-dim);
  box-shadow: 0 6px 0 var(--pixel-shadow), inset 0 0 40px rgba(0,0,0,0.3);
  background: #0a0512;
  display: block;
}

/* Story text */
.story-text {
  font-size: clamp(20px, 3.5vw, 26px);
  line-height: 1.6;
  color: var(--text-light);
  padding: 0 8px;
  margin-bottom: 20px;
}

.story-text .highlight {
  color: var(--yellow-br);
  font-weight: bold;
}

.story-text .fact {
  color: var(--accent-water);
}

/* Info box */
.info-box {
  background: rgba(46, 134, 222, 0.15);
  border-left: 4px solid var(--accent-water);
  padding: 12px 16px;
  margin: 16px 8px;
  font-size: 20px;
  line-height: 1.5;
}

.info-box .info-icon {
  color: var(--accent-water);
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  margin-right: 8px;
}

/* Choices */
.choices-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 8px;
  margin-top: 12px;
}

.choice-btn {
  font-family: 'VT323', monospace;
  font-size: clamp(18px, 3vw, 24px);
  background: rgba(255, 223, 0, 0.1);
  border: 3px solid var(--yellow-br);
  color: var(--yellow-br);
  padding: 14px 20px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  line-height: 1.4;
}

.choice-btn:hover {
  background: var(--yellow-br);
  color: var(--bg-dark);
  transform: translateX(6px);
  box-shadow: -6px 0 0 var(--accent-warm);
}

.choice-btn .choice-arrow {
  margin-right: 10px;
  display: inline-block;
}

/* Ending screen */
.ending-badge {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  display: inline-block;
  padding: 6px 12px;
  margin-bottom: 16px;
  background: var(--green-br);
  color: white;
}

.ending-summary {
  background: rgba(0,156,59,0.12);
  border: 2px solid var(--green-br);
  padding: 16px;
  margin: 16px 8px;
  font-size: 20px;
  line-height: 1.6;
}

.ending-summary h3 {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: var(--green-br);
  margin-bottom: 10px;
}

/* Restart button */
.restart-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  background: var(--accent-warm);
  border: none;
  color: white;
  padding: 16px 32px;
  cursor: pointer;
  display: block;
  margin: 30px auto;
  transition: all 0.2s;
}

.restart-btn:hover {
  background: var(--yellow-br);
  color: var(--bg-dark);
  transform: scale(1.05);
}

/* Progress bar */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 4px;
  background: var(--yellow-br);
  transition: width 0.5s ease;
  z-index: 100;
  box-shadow: 0 0 10px var(--yellow-br);
}

/* Fade in animation */
.fade-in {
  animation: fadeIn 0.6s ease forwards;
  opacity: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.fade-in-delay-1 { animation-delay: 0.2s; }
.fade-in-delay-2 { animation-delay: 0.5s; }
.fade-in-delay-3 { animation-delay: 0.8s; }

/* Typewriter for story */
.typewriter {
  overflow: hidden;
}

/* Scanline overlay */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 99;
}

/* Mobile responsive */
@media (max-width: 500px) {
  .char-card { width: 170px; padding: 14px; }
  .scene-container { padding: 0 8px 100px; }
}
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="progress-bar" id="progress-bar"></div>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-logo">VIDA<br>BRASILEIRA</div>
  <div class="title-sub">Het verhaal van Brazilië's opkomst — door jouw ogen</div>
  <div class="character-select">
    <div class="char-card" onclick="startGame('carlos')">
      <canvas id="carlos-portrait" width="96" height="96"></canvas>
      <div class="char-name">CARLOS</div>
      <div class="char-desc">Geboren bij de suikerrietvelden van São Paulo</div>
    </div>
    <div class="char-card" onclick="startGame('ana')">
      <canvas id="ana-portrait" width="96" height="96"></canvas>
      <div class="char-name">ANA</div>
      <div class="char-desc">Geboren in een vissersdorp bij Rio de Janeiro</div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="scene-container" id="scene-container"></div>
</div>


<script>
// ============================================================
// ENHANCED PIXEL ART ENGINE — Stardew-Valley-inspired
// ============================================================
const PX = 2;
const IW = 380, IH = 150;

const P = {
  skin1:'#f0c8a0', skin2:'#d4a574', skin3:'#b8895a',
  hairDk:'#1a0f05', hairBr:'#3d2510',
  leafLt:'#7ed957', leafMd:'#5cb340', leafDk:'#3d8a28',
  caneLt:'#a8e06a', caneMd:'#7ed957', caneDk:'#5aad3a', caneStk:'#8bba5c',
  waterLt:'#6ac4f0', waterMd:'#4a9ed9', waterDk:'#2d7ab8', waterFm:'#d4eef7',
  sandLt:'#f5e6c8', sandMd:'#e8d4a8', sandDk:'#c4aa78',
  woodLt:'#c49a6c', woodMd:'#a07840', woodDk:'#704c28', woodVDk:'#4a3018',
  roofR:'#c44830', roofRS:'#8c3020', roofO:'#e07830', roofOS:'#a85820',
  wallWh:'#f0ece4', wallCr:'#e8dcc8', wallPk:'#e8b8a8', wallBl:'#a8c8e0', wallYl:'#f0e0a0',
  concLt:'#b0b8c0', concMd:'#8a9298', concDk:'#6a7278', concVDk:'#4a5258',
  metalLt:'#c8ccd0', metalDk:'#7a8088',
  roadMd:'#505050', roadDk:'#383838',
  brG:'#009c3b', brY:'#ffdf00', brB:'#002776',
  black:'#0a0a0a', white:'#ffffff', red:'#d04040',
  orange:'#e88030', grassLt:'#6abf4b', grassMd:'#4a9e2f', grassDk:'#357a1e',
  cloudW:'#f5f5f5', cloudS:'#d4dce8',
  sunY:'#fff176', sunO:'#ffb74d',
  treeTr:'#5c3a1a', treeTrS:'#3d2510'
};

function px(c,x,y,col){c.fillStyle=col;c.fillRect(x*PX,y*PX,PX,PX);}
function rect(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(x*PX,y*PX,w*PX,h*PX);}
function hexRgb(h){const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function lerp(a,b,t){const A=hexRgb(a),B=hexRgb(b);return`rgb(${A.map((v,i)=>Math.round(v+(B[i]-v)*t))})`;}

function drawSky(c,w,h,stops){
  for(let y=0;y<h;y++){
    const t=y/h;let col=stops[0].c;
    for(let i=0;i<stops.length-1;i++){
      if(t>=stops[i].y&&t<stops[i+1].y){
        col=lerp(stops[i].c,stops[i+1].c,(t-stops[i].y)/(stops[i+1].y-stops[i].y));break;
      }
      if(t>=stops[stops.length-1].y)col=stops[stops.length-1].c;
    }
    rect(c,0,y,w,1,col);
  }
}

function drawCloud(c,x,y,w){
  rect(c,x+2,y,w-4,3,P.cloudW);rect(c,x,y+1,w,2,P.cloudW);
  rect(c,x+1,y+3,w-2,1,P.cloudS);px(c,x+3,y,'#ffffff');
}

function drawPerson(c,x,y,o){
  const s=o.skin||P.skin2,hr=o.hair||P.hairDk,sh=o.shirt||P.orange,
        pa=o.pants||P.brB,f=o.female,au=o.armUp,hat=o.hasHat;
  // Shadow
  rect(c,x-1,y+14,6,1,'rgba(0,0,0,0.15)');
  // Feet
  px(c,x,y+13,P.woodDk);px(c,x+3,y+13,P.woodDk);
  // Legs
  rect(c,x,y+10,2,3,pa);rect(c,x+2,y+10,2,3,pa);
  // Body
  rect(c,x-1,y+5,6,5,sh);
  px(c,x,y+6,lerp(sh,'#000000',0.15));px(c,x+4,y+6,lerp(sh,'#ffffff',0.12));
  // Arms
  if(au){px(c,x-2,y+4,s);px(c,x-2,y+3,s);px(c,x+5,y+4,s);px(c,x+5,y+3,s);}
  else{px(c,x-1,y+5,s);px(c,x-1,y+6,s);px(c,x+4,y+5,s);px(c,x+4,y+6,s);}
  // Head
  rect(c,x,y+1,4,4,s);px(c,x+3,y+2,lerp(s,'#000000',0.1));
  // Eyes
  px(c,x+1,y+2,P.black);px(c,x+2,y+2,P.black);
  // Mouth
  px(c,x+1,y+3,lerp(s,'#000000',0.25));
  // Hair
  rect(c,x-(f?1:0),y,4+(f?2:1),2,hr);px(c,x-(f?1:0),y+1,hr);px(c,x+3+(f?1:0),y+1,hr);
  if(f){for(let i=2;i<5;i++){px(c,x-1,y+i,hr);px(c,x+4,y+i,hr);}}
  if(hat){rect(c,x-2,y-1,8,2,P.brY);rect(c,x-1,y-2,6,2,P.brY);}
}

function drawHouse(c,x,y,wc,rc,rs,w,h){
  w=w||18;h=h||12;
  rect(c,x,y,w,h,wc);
  rect(c,x+w-1,y,1,h,lerp(wc,'#000000',0.12));
  for(let r=0;r<5;r++)rect(c,x-2+r,y-5+r,w+4-r*2,1,r<2?rc:rs);
  rect(c,x-2,y-5,w+4,1,lerp(rc,'#ffffff',0.15));
  rect(c,x+Math.floor(w/2)-2,y+h-7,4,7,P.woodDk);
  px(c,x+Math.floor(w/2)+1,y+h-4,P.brY);
  rect(c,x+2,y+2,4,4,'#87ceeb');
  px(c,x+4,y+2,P.woodDk);px(c,x+2,y+4,P.woodDk);
  rect(c,x+2,y+2,4,1,P.woodMd);
}

function drawPalm(c,x,y,h){
  for(let i=0;i<h;i++){
    const cv=Math.sin(i/h*1.5)*3;
    px(c,x+cv,y-i,P.woodMd);px(c,x+cv+1,y-i,P.woodDk);
    if(i%4===0)px(c,x+cv-1,y-i,P.woodLt);
  }
  const top=y-h;
  for(let f=0;f<7;f++){
    const a=(f/7)*Math.PI*2+0.3,len=8+(f%2)*3;
    for(let i=0;i<len;i++){
      const fx=x+Math.cos(a)*i+Math.sin(i*0.5)*0.5,fy=top+Math.sin(a)*i*0.5+i*0.3;
      px(c,Math.round(fx),Math.round(fy),i<len*0.4?P.leafLt:(i<len*0.7?P.leafMd:P.leafDk));
      if(i%2===0)px(c,Math.round(fx),Math.round(fy)+1,i<len*0.5?P.leafMd:P.leafDk);
    }
  }
}

function drawTree(c,x,y,sz){
  rect(c,x,y,Math.max(2,sz/3|0),sz,P.treeTr);
  const cx=x-sz+(sz/6|0),cy=y-sz*1.8,cw=sz*2.5,ch=sz*2;
  for(let dy=2;dy<ch;dy++){
    const ww=Math.sin((dy/ch)*Math.PI)*cw/2;
    for(let dx=-ww;dx<ww;dx++){
      const n=((Math.floor(cx+cw/2+dx)+Math.floor(cy+dy))%3);
      px(c,Math.round(cx+cw/2+dx),Math.round(cy+dy),n===0?P.leafLt:n===1?P.leafMd:P.leafDk);
    }
  }
}

// ============================================================
// SCENE 1: Sugar Fields 1975 — golden hour warmth
// ============================================================
function drawSugarFields1975(ctx,w,h){
  const c=ctx;
  drawSky(c,IW,IH,[{y:0,c:'#4a78c8'},{y:0.15,c:'#7baae0'},{y:0.25,c:'#c8a870'},{y:0.32,c:'#e8a850'},{y:0.38,c:'#f0c870'}]);
  // Sun
  for(let r=12;r>0;r--)for(let a=0;a<40;a++){const ang=(a/40)*Math.PI;
    px(c,Math.round(320+Math.cos(ang)*r),Math.round(48+Math.sin(ang)*r*0.6-r*0.3),r>8?'#f0c87030':r>4?P.sunO:P.sunY);}
  // Mountains
  for(let x=0;x<IW;x++){const mh=Math.sin(x*0.015)*12+Math.sin(x*0.04)*6+Math.cos(x*0.008)*8+20;
    for(let y=0;y<mh;y++){const t=y/mh;px(c,x,56-mh+y,t<0.3?'#6a5a8a':t<0.6?'#5a4a7a':'#4a3a6a');}}
  // Ground
  for(let x=0;x<IW;x++){const gy=58+Math.sin(x*0.02)*3;
    for(let y=gy;y<IH;y++){const t=(y-gy)/(IH-gy),n=(x+y*3)%5;
      px(c,x,y,t<0.15?(n<2?'#8a7a30':'#7a6a28'):t<0.5?(n<2?'#6a5a20':'#5a4a18'):(n<2?'#4a3a14':'#3a2a10'));}}
  // Dirt path
  for(let x=0;x<IW;x++){const pc=120+Math.sin(x*0.01)*20;
    if(Math.abs(x-pc)<6)for(let y=62;y<IH;y++)px(c,x,y,Math.abs(x-pc)>4?'#8a7040':'#a08850');}
  // Sugar cane layers
  for(let L=0;L<5;L++){const bY=44+L*6,d=L<2?3:2;
    for(let x=0;x<IW;x+=d){if(x>110&&x<140)continue;
      const ch=14+Math.sin(x*0.3+L*2)*4+L*2,sw=Math.sin(x*0.1+L);const dk=L>2;
      for(let y=0;y<ch;y++){const sx=x+sw*(y/ch);
        px(c,Math.round(sx),bY+ch-y,dk?(y%6<3?P.caneDk:P.caneStk):(y%6<3?P.caneMd:P.caneLt));}
      if(x%(d*2)===0){const tx=x+sw;px(c,Math.round(tx-1),bY-1,dk?P.caneDk:P.leafLt);
        px(c,Math.round(tx+1),bY-2,dk?P.caneDk:P.leafMd);}}}
  // House
  const hx=114,hy=50;drawHouse(c,hx,hy,P.wallCr,P.roofR,P.roofRS,20,14);
  px(c,hx+3,hy+3,'#ffcc44');px(c,hx+4,hy+3,'#ffcc44');px(c,hx+3,hy+4,'#ffaa22');
  rect(c,hx+14,hy-7,2,4,P.concDk);px(c,hx+14,hy-9,'#c8c0b8');px(c,hx+15,hy-11,'#d0c8c0');
  // Father
  drawPerson(c,90,56,{shirt:'#d08030',pants:'#5a4020',hasHat:true,skin:P.skin3});
  // Baby
  rect(c,hx+9,hy+10,3,4,P.skin2);rect(c,hx+9,hy+9,3,2,P.hairDk);
  // Trees
  drawTree(c,15,62,4);drawTree(c,350,60,5);
  // Fireflies
  [[50,40],[200,35],[280,42],[350,38]].forEach(([a,b])=>px(c,a,b,'#ffe87060'));
}

// ============================================================
// SCENE 2: Itaipu Dam — on an old TV
// ============================================================
function drawItaipuDam(ctx,w,h){
  const c=ctx;
  rect(c,0,0,IW,IH,'#2a2018');rect(c,10,5,IW-20,IH-15,'#3a3028');rect(c,12,7,IW-24,IH-19,'#4a4038');
  const sx=20,sy=10,sw=IW-60,sh=IH-25;
  // Sky in screen
  for(let y=0;y<sh*0.4;y++){const t=y/(sh*0.4);for(let x=0;x<sw;x++)px(c,sx+x,sy+y,lerp('#88aabb','#aabbcc',t));}
  // Water behind dam
  for(let y=sy+sh*0.3;y<sy+sh*0.55;y++)for(let x=0;x<sw;x++)
    px(c,sx+x,y,Math.sin(x*0.2+y*0.5)>0.7?'#99bbcc':'#7799aa');
  // Dam
  const dx=sx+sw*0.15,dw=sw*0.7,dt=sy+sh*0.2,db=sy+sh*0.7;
  for(let y=dt;y<db;y++)for(let x=0;x<dw;x++){const t=(y-dt)/(db-dt);const s=(Math.floor(x/8)%2===0);
    px(c,dx+x,y,s?lerp('#889098','#667078',t):lerp('#8898a0','#607078',t));}
  rect(c,dx-3,dt-1,dw+6,2,'#99a0a8');
  // Spillways
  for(let i=0;i<5;i++){const spx=dx+15+i*(dw-30)/5;rect(c,spx,dt+10,6,20,'#556068');
    for(let y=0;y<15;y++){px(c,spx+2,db+y,'#aaddee');px(c,spx+3,db+y,'#88bbcc');px(c,spx+4,db+y,'#aaddee');}

function drawPixelScene(id, fn, w, h) {

}

  // Update progress bar
  document.getElementById('progress-bar').style.width = 
    ((currentState.sceneIndex / totalScenes) * 100) + '%';

  // Get text (might be dynamic)
  let storyText = scene.getText ? scene.getText(currentState) : scene.text;

  // Build scene HTML
  let html = `
    <div class="year-header fade-in">${scene.year}</div>
    <div class="chapter-title fade-in fade-in-delay-1">${scene.title}</div>
    <canvas class="scene-art fade-in" id="scene-canvas" width="760" height="300"></canvas>
    <div class="story-text fade-in fade-in-delay-1">${storyText}</div>
    <div class="info-box fade-in fade-in-delay-2">
      <span class="info-icon">ℹ️</span> ${scene.infoBox}
    </div>
    <div class="choices-container fade-in fade-in-delay-3">
      ${scene.choices.map((c, i) => `
        <button class="choice-btn" onclick="makeChoice(${i})">
          ${c.text}
        </button>
      `).join('')}
    </div>
  `;

  container.innerHTML = html;

  // Draw the pixel art
  setTimeout(() => {
    const canvas = document.getElementById('scene-canvas');
    if (canvas && scene.artFunc) {
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      scene.artFunc(ctx, canvas.width, canvas.height);
    }
  }, 50);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function makeChoice(index) {
  const data = gameData[currentState.character];
  const scene = data.scenes[currentState.sceneIndex];
  const choice = scene.choices[index];

  currentState.choices.push(choice.tag);

  if (choice.path) currentState.path = choice.path;
  if (choice.ending) currentState.ending = choice.ending;

  currentState.sceneIndex++;

  if (currentState.sceneIndex >= data.scenes.length) {
    renderEnding();
  } else {
    renderScene();
  }
}

function renderEnding() {
  const data = gameData[currentState.character];

  // Determine ending based on last two choices that have ending tags
  let endingNum = currentState.ending || 1;
  // Check last two scenes for ending preferences
  const endingChoices = currentState.choices.slice(-2);
  const endingScores = {1: 0, 2: 0, 3: 0};
  
  // Use the explicit ending if set, otherwise derive from choices
  if (!currentState.ending) {
    // Fallback: map tags to endings
    endingChoices.forEach(tag => {
      if (['optimist','kansen','trots','auto'].includes(tag)) endingScores[1]++;
      if (['realist','leren','uitleg','huis'].includes(tag)) endingScores[2]++;
      if (['duurzaam','slim','bezorgd','milieu'].includes(tag)) endingScores[3]++;
    });
    endingNum = Object.entries(endingScores).sort((a,b) => b[1]-a[1])[0][0];
  }

  const ending = data.endings[endingNum];

  document.getElementById('progress-bar').style.width = '100%';

  const container = document.getElementById('scene-container');
  const charName = currentState.character === 'carlos' ? 'Carlos' : 'Ana';

  container.innerHTML = `
    <div class="year-header fade-in">2024</div>
    <div class="chapter-title fade-in fade-in-delay-1">${ending.title}</div>
    <canvas class="scene-art fade-in" id="ending-canvas" width="760" height="300"></canvas>
    <div class="ending-badge fade-in fade-in-delay-1">EINDE — ${ending.title.toUpperCase()}</div>
    <div class="story-text fade-in fade-in-delay-2">${ending.text}</div>
    <div class="ending-summary fade-in fade-in-delay-3">
      <h3>📚 WAT HEB JE GELEERD?</h3>
      ${ending.summary}
    </div>
    <div class="ending-summary fade-in fade-in-delay-3" style="border-color: var(--yellow-br); background: rgba(255,223,0,0.08);">
      <h3>🇧🇷 BRAZILIË'S ENERGIEMIX</h3>
      ⚡ ~70% waterkracht (hernieuwbaar, geen CO₂)<br>
      🌱 Biobrandstoffen uit suikerriet (80% rijdt flexfuel)<br>
      ☢️ 3% kernenergie (eigen uranium)<br>
      🛢️ Eigen olie sinds 2007 (exporteur!)<br>
      🔥 Aardgas (geïmporteerd)<br><br>
      📈 Energievraag groeit door: welvaart, industrie, bevolkingsgroei<br>
      🌍 Verbruik per persoon: nog 3x lager dan Nederland
    </div>
    <button class="restart-btn" onclick="restart()">🔄 OPNIEUW SPELEN</button>
  `;

  // Draw ending art
  setTimeout(() => {
    const canvas = document.getElementById('ending-canvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      drawFutureEnding(ctx, canvas.width, canvas.height, ending.artType);
    }
  }, 50);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  document.getElementById('progress-bar').style.width = '0%';
  currentState = { character: null, sceneIndex: 0, choices: [], path: null, ending: null };
}

  drawPixelScene('carlos-portrait', drawCarlosPortrait, 96, 96);
  drawPixelScene('ana-portrait', drawAnaPortrait, 96, 96);
});
</script>
