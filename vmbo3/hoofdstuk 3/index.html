<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Apps — OBC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
  }

  header {
    background: #1e293b;
    border-bottom: 2px solid #334155;
    padding: 24px 32px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 900;
    color: #38bdf8;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.9rem;
    opacity: 0.6;
    margin-top: 4px;
  }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .klas-sectie h2 {
    font-size: 1rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #94a3b8;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #1e293b;
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .app-kaart {
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 14px;
    padding: 18px 20px;
    text-decoration: none;
    color: #f1f5f9;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .app-kaart:hover {
    border-color: #38bdf8;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(56,189,248,0.1);
  }

  .app-kaart.leeg {
    opacity: 0.35;
    cursor: default;
    pointer-events: none;
  }

  .app-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
  }

  .app-info { flex: 1; }

  .app-titel {
    font-weight: 800;
    font-size: 0.95rem;
    line-height: 1.3;
  }

  .app-meta {
    font-size: 0.78rem;
    opacity: 0.55;
    margin-top: 3px;
  }

  .app-pijl {
    font-size: 1rem;
    opacity: 0.4;
    flex-shrink: 0;
  }

  .app-kaart:hover .app-pijl { opacity: 1; color: #38bdf8; }

  .leeg-melding {
    color: #475569;
    font-size: 0.88rem;
    font-style: italic;
    padding: 8px 0;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 0.78rem;
    opacity: 0.3;
    border-top: 2px solid #1e293b;
    margin-top: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>🌍 AK Apps — OBC</h1>
  <p>Aardrijkskunde apps per klas · gemaakt via vibe-coding</p>
</header>

<main id="app-overzicht"></main>

<footer>EVO-GEO · OBC · Aardrijkskunde</footer>

<script>
const KLASSEN = [
  {
    naam: "VWO 1",
    id: "vwo1",
    apps: []
  },
  {
    naam: "VWO 2",
    id: "vwo2",
    apps: []
  },
  {
    naam: "HAVO 1",
    id: "havo1",
    apps: []
  },
  {
    naam: "HAVO 2",
    id: "havo2",
    apps: []
  },
  {
    naam: "VMBO 1",
    id: "vmbo1",
    apps: []
  },
  {
    naam: "VMBO 2",
    id: "vmbo2",
    apps: []
  },
  {
    naam: "VMBO 3",
    id: "vmbo3",
    apps: [
      {
        titel: "Energieminister",
        beschrijving: "Hoofdstuk 3 · Energiebeleid simulatie",
        icon: "⚡",
        pad: "vmbo3/hoofdstuk%203/Game-H3-energie_minister.html"
      }
    ]
  },
  {
    naam: "VMBO 4",
    id: "vmbo4",
    apps: []
  }
];

const main = document.getElementById('app-overzicht');

KLASSEN.forEach(klas => {
  const sectie = document.createElement('div');
  sectie.className = 'klas-sectie';

  const titel = document.createElement('h2');
  titel.textContent = klas.naam;
  sectie.appendChild(titel);

  if (klas.apps.length === 0) {
    const leeg = document.createElement('p');
    leeg.className = 'leeg-melding';
    leeg.textContent = 'Nog geen apps beschikbaar voor deze klas.';
    sectie.appendChild(leeg);
  } else {
    const grid = document.createElement('div');
    grid.className = 'apps-grid';

    klas.apps.forEach(app => {
      const kaart = document.createElement('a');
      kaart.className = 'app-kaart';
      kaart.href = app.pad;
      kaart.innerHTML = `
        <div class="app-icon">${app.icon}</div>
        <div class="app-info">
          <div class="app-titel">${app.titel}</div>
          <div class="app-meta">${app.beschrijving}</div>
        </div>
        <div class="app-pijl">→</div>
      `;
      grid.appendChild(kaart);
    });

    sectie.appendChild(grid);
  }

  main.appendChild(sectie);
});
</script>
</body>
</html>
